<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mis Préstamos</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-title">💰 Mis Préstamos</div>
  <button id="btn-ayuda" class="btn-icon" title="Ayuda">❓</button>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-view="inicio"><span class="tab-icon">🏠</span><span>Inicio</span></button>
  <button class="tab-btn" data-view="clientes"><span class="tab-icon">👤</span><span>Clientes</span></button>
  <button class="tab-btn" data-view="prestamos"><span class="tab-icon">📄</span><span>Préstamos</span></button>
  <button class="tab-btn" data-view="solicitudes"><span class="tab-icon">📥</span><span>Solicitudes</span><span class="tab-badge hidden" id="badge-solicitudes">0</span></button>
</nav>

<main id="app"></main>

<!-- Overlay de modal generico -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Título</h2>
      <button id="modal-cerrar" class="btn-icon">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
